<svg width="100%" viewBox="0 0 680 330" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  text { font-family: Arial, sans-serif; fill: #333; }
  .label-main { font-size: 13px; font-weight: 600; fill: #555; }
  .label-sm { font-size: 10px; fill: #777; }
  .label-dim { font-size: 12px; font-weight: 600; fill: #222; }
  .label-note { font-size: 10px; fill: #999; }
</style>

<!-- ===== VIEW LABELS ===== -->
<text class="label-main" x="155" y="26" text-anchor="middle">TOP VIEW</text>
<text class="label-main" x="430" y="26" text-anchor="middle">FRONT VIEW</text>
<text class="label-main" x="605" y="26" text-anchor="middle">SIDE VIEW</text>

<line x1="305" y1="14" x2="305" y2="295" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4"/>
<line x1="520" y1="14" x2="520" y2="295" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- ============================================================ -->
<!-- TOP VIEW                                                     -->
<!-- ============================================================ -->

<!-- Wall (left edge, vertical) -->
<rect x="38" y="44" width="10" height="230" rx="2" fill="#888" opacity="0.45"/>
<text class="label-sm" x="32" y="132" text-anchor="end">wall</text>

<!-- Board center on wall at (48, 160) -->
<circle cx="48" cy="160" r="26" fill="none" stroke="#333" stroke-width="1.5" opacity="0.7"/>
<circle cx="48" cy="160" r="5"  fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
<text class="label-sm" x="27" y="155">dartboard</text>

<!-- Arm line: 50° from wall, going RIGHT (toward viewer side) -->
<!-- Wall normal = right (+x). 50° from wall surface = 50° from y-axis = arm at 40° below horizontal going RIGHT -->
<!-- dx = cos(40°)*110 = 84, dy = +sin(40°)*110 = 71  (downward = toward viewer) -->
<!-- Camera at (48+84, 160+71) = (132, 231) -->
<line x1="48" y1="160" x2="132" y2="231" stroke="#333" stroke-width="2" stroke-dasharray="6 3" opacity="0.8"/>

<!-- Camera body -->
<rect x="123" y="223" width="20" height="16" rx="3" fill="none" stroke="#333" stroke-width="1.8" opacity="0.9"/>
<circle cx="133" cy="231" r="4" fill="none" stroke="#333" stroke-width="1.2" opacity="0.9"/>

<!-- FOV cone -->
<line x1="123" y1="223" x2="38" y2="120" stroke="#999" stroke-width="0.6" opacity="0.25" stroke-dasharray="3 3"/>
<line x1="143" y1="231" x2="38" y2="200" stroke="#999" stroke-width="0.6" opacity="0.25" stroke-dasharray="3 3"/>

<!-- Sight line camera → board -->
<line x1="133" y1="231" x2="48" y2="160" stroke="#999" stroke-width="0.8" opacity="0.35" stroke-dasharray="3 3"/>

<!-- Wall reference line for angle -->
<line x1="48" y1="160" x2="48" y2="240" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.5"/>

<!-- Angle arc: 50° from wall (y-axis) sweeping clockwise toward the arm -->
<!-- Center (48,160), r=35. Start: straight down = (48,195). End: 50° from down, clockwise = angle from east = -90°+50°=-40° → x=48+35*cos(-40°)=48+26.8=74.8, y=160+35*sin(-40°)=160-22.5=137.5... -->
<!-- Actually: start of arc at straight-down from center = (48, 160+35)=(48,195). Arc sweeps LEFT (counterclockwise in standard, but SVG y-flipped). 50° from wall (vertical). sweep-flag=0 for CCW. End: 50° from y-axis going right = angle from east = -(90-50)=-40° → x=48+35*cos(-40°)=74.8, y=160+35*sin(-40°)=137.5 that's upward, wrong direction. -->
<!-- Down direction in SVG: angle from east = 90°. 50° from down toward right = 90°-50°=40° from east → x=48+35*cos(40°)=48+26.8=74.8, y=160+35*sin(40°)=160+22.5=182.5 -->
<path d="M 48 195 A 35 35 0 0 0 74.8 182.5" fill="none" stroke="#666" stroke-width="1.2"/>
<text class="label-sm" x="60" y="205" style="font-size:11px; fill:#444;">50°</text>

<!-- 60cm dimension label near midpoint of arm -->
<text class="label-dim" x="98" y="230" text-anchor="middle">60 cm</text>

<!-- "camera" label -->
<text class="label-sm" x="133" y="248">camera</text>

<!-- ============================================================ -->
<!-- FRONT VIEW                                                   -->
<!-- ============================================================ -->

<!-- Wall background -->
<rect x="330" y="44" width="175" height="240" rx="2" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
<text class="label-sm" x="348" y="62">wall</text>

<!-- Dartboard face -->
<circle cx="420" cy="165" r="46" fill="none" stroke="#333" stroke-width="1.5" opacity="0.85"/>
<circle cx="420" cy="165" r="7"  fill="none" stroke="#555" stroke-width="1.2" opacity="0.7"/>
<circle cx="420" cy="165" r="15" fill="none" stroke="#777" stroke-width="0.7" opacity="0.4"/>
<circle cx="420" cy="165" r="30" fill="none" stroke="#777" stroke-width="0.7" opacity="0.3"/>
<circle cx="420" cy="165" r="42" fill="none" stroke="#777" stroke-width="0.7" opacity="0.25"/>
<line x1="420" y1="119" x2="420" y2="211" stroke="#999" stroke-width="0.5" opacity="0.25"/>
<line x1="374" y1="165" x2="466" y2="165" stroke="#999" stroke-width="0.5" opacity="0.25"/>
<circle cx="420" cy="165" r="3" fill="#666" opacity="0.6"/>

<!-- Camera left of board, same height as bullseye -->
<rect x="316" y="158" width="20" height="14" rx="3" fill="none" stroke="#333" stroke-width="1.8" opacity="0.9"/>
<circle cx="326" cy="165" r="3.5" fill="none" stroke="#333" stroke-width="1.2" opacity="0.9"/>
<line x1="330" y1="165" x2="374" y2="165" stroke="#333" stroke-width="2" stroke-dasharray="5 3" opacity="0.8"/>
<text class="label-sm" x="326" y="150" text-anchor="middle">camera</text>
<text class="label-sm" x="420" y="222" text-anchor="middle">dartboard</text>

<!-- same height annotation -->
<line x1="326" y1="165" x2="326" y2="195" stroke="#bbb" stroke-width="0.6" opacity="0.4" stroke-dasharray="2 2"/>
<line x1="420" y1="165" x2="420" y2="195" stroke="#bbb" stroke-width="0.6" opacity="0.4" stroke-dasharray="2 2"/>
<line x1="326" y1="195" x2="420" y2="195" stroke="#999" stroke-width="0.8" opacity="0.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text class="label-sm" x="373" y="208" text-anchor="middle">same height as bullseye</text>
<line x1="370" y1="165" x2="490" y2="165" stroke="#bbb" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4"/>
<text class="label-sm" x="520" y="169">bullseye</text>
<text class="label-sm" x="520" y="180">height</text>


<!-- ============================================================ -->
<!-- SIDE VIEW                                                    -->
<!-- ============================================================ -->

<!-- Wall -->
<rect x="658" y="44" width="10" height="240" rx="2" fill="#888" opacity="0.45"/>
<text class="label-sm" x="654" y="222" text-anchor="end">wall</text>

<!-- Board side view -->
<rect x="644" y="138" width="14" height="54" rx="4" fill="#333" opacity="0.7"/>
<text class="label-sm" x="653" y="133" text-anchor="end">board</text>

<!-- Bullseye height line -->
<line x1="535" y1="165" x2="657" y2="165" stroke="#bbb" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>

<!-- Arm is perfectly horizontal -->
<line x1="644" y1="165" x2="584" y2="165" stroke="#333" stroke-width="2" stroke-dasharray="5 3" opacity="0.8"/>

<!-- Camera body side view -->
<rect x="566" y="158" width="20" height="14" rx="3" fill="none" stroke="#333" stroke-width="1.8" opacity="0.9"/>
<circle cx="576" cy="165" r="3.5" fill="none" stroke="#333" stroke-width="1.2" opacity="0.9"/>
<text class="label-sm" x="576" y="152" text-anchor="middle">camera</text>

<!-- Horizontal reference -->
<line x1="548" y1="155" x2="548" y2="175" stroke="#999" stroke-width="0.8" opacity="0.4"/>
<text class="label-sm" x="617" y="162" text-anchor="middle">0° vertical</text>


<!-- ============================================================ -->
<!-- LEGEND + NOTES                                               -->
<!-- ============================================================ -->

<!-- legend -->
<line x1="38" y1="307" x2="72" y2="307" stroke="#333" stroke-width="2" stroke-dasharray="6 3" opacity="0.8"/>
<text class="label-sm" x="78" y="311" style="font-size:11px;">Camera arm (60 cm)</text>
<line x1="220" y1="307" x2="254" y2="307" stroke="#999" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.5"/>
<text class="label-sm" x="260" y="311" style="font-size:11px;">Sight / FOV line</text>
<rect x="380" y="300" width="20" height="14" rx="3" fill="none" stroke="#333" stroke-width="1.8" opacity="0.9"/>
<text class="label-sm" x="406" y="311" style="font-size:11px;">Camera</text>
<circle cx="505" cy="307" r="8" fill="none" stroke="#333" stroke-width="1.5" opacity="0.7"/>
<text class="label-sm" x="518" y="311" style="font-size:11px;">Dartboard</text>


</svg>
